app-id: io.github.NikolausB.WorkoutTimer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: training
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=system-bus
  - --device=dri
  - --device=all
  - --talk-name=org.bluez
  - --share=ipc
  - --share=network
modules:
  - name: training
    buildsystem: meson
    sources:
      - type: dir
        path: .