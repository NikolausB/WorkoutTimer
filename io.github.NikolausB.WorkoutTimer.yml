app-id: io.github.NikolausB.WorkoutTimer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: training
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc
  - --share=network
modules:
  - name: training
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/NikolausB/WorkoutTimer
        tag: v1.1.0
        commit: 65f3298fb298194e5b9d38faf88990dfbc873542