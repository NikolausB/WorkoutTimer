<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Bodenlinie -->
  <line x1="12" y1="96" x2="116" y2="96" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Körper + Beine: eine gerade diagonale Linie (Plank) -->
  <line x1="44" y1="72" x2="104" y2="96" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Arm: eine Linie von Schulter zum Boden -->
  <line x1="44" y1="72" x2="32" y2="96" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Kopf -->
  <circle cx="36" cy="58" r="10" fill="white"/>
</svg>